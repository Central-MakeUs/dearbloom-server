name: 🔴 Backend CI/CD Prod

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: [self-hosted, prod, dearbloom]
    environment: prod

    steps:
      - name: Git Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build with Gradle
        run: |
          chmod +x ./gradlew
          ./gradlew clean build -x test --no-daemon --max-workers=1
        env:
          GRADLE_OPTS: >-
            -Xmx768m
            -XX:MaxMetaspaceSize=256m
            -XX:ReservedCodeCacheSize=96m
            -XX:+UseSerialGC
            -Dorg.gradle.daemon=false
            -Dorg.gradle.workers.max=1

      - name: Build Docker image
        run: docker build -f Dockerfile -t ${{ secrets.DOCKER_IMAGE }} .

      - name: Deploy with Docker Compose
        working-directory: ${{ secrets.DOCKER_COMPOSE_DIR }}
        run: |
          docker compose up -d --no-deps --force-recreate ${{ secrets.DOCKER_CONTAINER_NAME }}
          docker image prune -f